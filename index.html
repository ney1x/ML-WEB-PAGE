<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAR Tecnológico | Messi vs Cristiano</title>
    <style>
        :root {
            --pitch-green: #1a472a;
            --grass-light: #2d5a3c;
            --gold: #d4af37;
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, var(--grass-light) 0%, var(--pitch-green) 100%);
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .stadium-header {
            text-align: center;
            padding: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .stadium-header h1 { margin: 0; font-size: 2.5rem; }
        .stadium-header p { color: var(--gold); font-weight: bold; }

        .player-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 3px solid var(--gold);
            border-radius: 20px;
            padding: 20px;
            width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: "GOAT CHECK";
            position: absolute;
            top: 10px;
            right: -30px;
            background: var(--gold);
            color: black;
            padding: 5px 40px;
            transform: rotate(45deg);
            font-size: 0.7rem;
            font-weight: bold;
        }

        #image-preview { 
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem;
            display: none;
        }

        .upload-btn {
            background: var(--gold);
            color: black;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s;
            margin-bottom: 1rem;
        }

        .upload-btn:hover { transform: scale(1.05); }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-row {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--gold);
        }

        .stat-name { font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .stat-value { color: var(--gold); font-family: monospace; font-size: 1.2rem; }

        .footer { 
            margin-top: auto;
            padding: 2rem;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="stadium-header">
        <h1>VAR TECNOLÓGICO</h1>
        <p>Análisis de Élite: Messi vs Cristiano</p>
    </div>

    <div class="player-card">
        <label for="imageUpload" class="upload-btn">
            ⚽ SUBIR FOTO DEL CRACK
        </label>
        <input type="file" id="imageUpload" accept="image/*">
        
        <img id="image-preview" alt="Analizando jugador...">
        
        <div id="label-container">
            <div class="stat-row">Esperando alineación...</div>
        </div>
    </div>

    <div class="footer">
        Universidad Simon Bolivar
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        const URL = "./"; 
        let model, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                document.getElementById("label-container").innerHTML = '<div class="stat-row">SISTEMA LISTO PARA EL PITAZO INICIAL</div>';
            } catch (error) {
                document.getElementById("label-container").innerHTML = '<div class="stat-row">ERROR EN EL VESTUARIO (CORS/Ruta)</div>';
            }
        }

        const imageUpload = document.getElementById('imageUpload');
        const imagePreview = document.getElementById('image-preview');
        const labelContainer = document.getElementById('label-container');

        imageUpload.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                labelContainer.innerHTML = '<div class="stat-row">REVISANDO EN EL VAR...</div>';

                imagePreview.onload = async () => {
                    if (!model) return;
                    
                    const prediction = await model.predict(imagePreview);
                    labelContainer.innerHTML = "";
                    
                    prediction.sort((a, b) => b.probability - a.probability);

                    for (let i = 0; i < maxPredictions; i++) {
                        const probability = (prediction[i].probability * 100).toFixed(0);
                        const row = document.createElement("div");
                        row.className = "stat-row";
                        row.innerHTML = `
                            <span class="stat-name">${prediction[i].className}</span>
                            <span class="stat-value">${probability}%</span>
                        `;
                        labelContainer.appendChild(row);
                    }
                }
            };
            reader.readAsDataURL(file);
        });

        init();
    </script>
</body>
</html>
